    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:  linear-gradient(135deg, #000000 0%, #8b8b8b 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-badge {
            background: #ef4444;
        }

        .btn-logout {
            background: #6b7280;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #4b5563;
            transform: translateY(-2px);
        }

        .btn-install {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .install-banner {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .install-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16,185,129,0.3);
        }

        .install-banner.hidden {
            display: none;
        }

        /* Banner Offline */
        .offline-banner {
            background: #f59e0b;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .offline-banner.online {
            background: #10b981;
        }

        /* Formulario */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group datalist, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        
        .btn-large {
    padding: 18px 32px;
    font-size: 20px;
    font-weight: 800;
    border-radius: 16px;
    min-width: 200px;
    margin: 5px;
}

.btn-large i {
    margin-right: 10px;
    font-size: 22px;
}

/* Estilo para grupo de botones */
.btn-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

        .btn {
    padding: 16px 28px;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    min-width: 160px;
}

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-success {
            background: yellow;
            color: black;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        /* Estadísticas */
       .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 28px;
            margin-bottom: 5px;
            color: #333;
        }

        /* Filtros */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filters select, .filters input {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
        }

        /* Lista de visitas */
        .visitas-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .visita-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .visita-card:hover {
            transform: translateY(-2px);
        }

        .visita-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .visita-nombre {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .visita-fecha {
            color: #666;
            font-size: 12px;
        }

        .visita-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-icon {
            padding: 8px 12px;
            font-size: 14px;
        }

        /* Menú flotante moderno */
        .floating-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .menu-item {
            text-align: center;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .menu-item svg {
            width: 24px;
            height: 24px;
            stroke: #667eea;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.3s;
        }

        .menu-item.active {
            background: linear-gradient(135deg, #ff0000, #820000);
        }

        .menu-item.active svg {
            stroke: white;
        }

        .menu-item.active span {
            color: white;
        }

        .menu-item span {
            font-size: 11px;
            color: #666;
            font-weight: 500;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
    background: rgba(0,0,0,0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: modalFadeIn 0.3s;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Admin Panel */
        .brigadistas-list {
            display: grid;
            gap: 15px;
        }

        .brigadista-card {
            background: white;
            padding: 8px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .brigadista-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 15px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .menu-item {
                padding: 8px 12px;
            }
        }

        .hidden {
            display: none;
        }

        .pending-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 8px;
            border-radius: 50px;
            font-size: 12px;
        }



        /* Estilos mejorados para tarjetas de brigadistas */
.brigadista-card {
    transition: transform 0.2s, box-shadow 0.2s;
}

.brigadista-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Scrollbar personalizado para el modal */
.swal2-popup::-webkit-scrollbar {
    width: 8px;
}

.swal2-popup::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

.swal2-popup::-webkit-scrollbar-thumb {
    background: #667eea;
    border-radius: 10px;
}


        /* Dashboard compacto responsivo */
@media (max-width: 480px) {
    #dashboardStats {
        gap: 4px !important;
    }
    #dashboardStats > div {
        padding: 4px 2px !important;
    }
    #dashboardStats > div div:first-child {
        font-size: 9px !important;
                min-height: 28px;

    }
    #dashboardStats > div div:nth-child(2) {
        font-size: 14px !important;
    }
}

        @media (max-width: 360px) {
    #dashboardStats {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 6px !important;
    }
    #dashboardStats > div {
        padding: 6px 2px !important;
    }
    #dashboardStats > div div:first-child {
        font-size: 9px !important;
    }
    #dashboardStats > div div:nth-child(2) {
        font-size: 16px !important;
    }
}
    </style>
</head>
<body>
    <div class="container">
  

      

        <div id="offlineBanner" class="offline-banner online">
            <i class="fas fa-wifi"></i>
            <span>Online</span>
            <span id="pendingCount" class="pending-badge hidden">0 pendientes</span>
        </div>

          <!-- Banner de instalación PWA -->
        <div id="installBanner" class="install-banner hidden">
            <div>
                <i class="fas fa-mobile-alt"></i>
                <strong>¡Instala la aplicación!</strong> 
            </div>
            <button id="installNowBtn" class="btn btn-success">Instalar ahora <i class="fas fa-arrow-right"></i></button>
        </div>
        
        <!-- Sección Registro -->
        <div id="registroSection" class="form-card">
            <h2><i class="fas fa-user-plus"></i> Registrar Visita</h2>
<form id="visitaForm" autocomplete="off">
    <div class="form-group">
                    <label>Nombre completo *</label>
<input type="text" id="personaNombre" required placeholder="Nombre de la persona visitada" 
       style="text-transform: uppercase;" 
       oninput="this.value = this.value.toUpperCase();"
       autocomplete="off"
       autocomplete="new-password"
       autofill="off">
                </div>
                <div class="form-group">
                    <label>Numero de Teléfono *</label>
<input type="tel" id="personaTelefono" placeholder="Número a 10 dígitos" 
       maxlength="10" pattern="[0-9]{10}" 
       oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10)" 
       required
    inputmode="numeric"
       autocomplete="off"
       autofill="off">
                </div>
                <div class="form-group">
                    <label>Colonia *</label>
<input type="text" id="personaColonia" list="coloniasList" 
       placeholder="COLONIA" 
       style="text-transform: uppercase;" 
       oninput="this.value = this.value.toUpperCase();"
       autocomplete="off"
       autofill="off"
       autocomplete="new-password">
                    <datalist id="coloniasList"></datalist>
                </div>

                
                
            <div class="btn-group">
    <button type="submit" class="btn btn-primary btn-large" id="submitBtn"><i class="fas fa-save"></i> GUARDAR VISITA </button>
    <button type="button" class="btn btn-success btn-large hidden" id="updateBtn"><i class="fas fa-edit"></i> ACTUALIZAR VISITA</button>
    <button type="button" class="btn btn-danger btn-large hidden" id="cancelEditBtn"><i class="fas fa-times"></i> CANCELAR</button>
</div>

     <div class="form-group">
                <label>🏠 Seccion / Manzana</label>
                <input type="text" id="numCalle" 
                       placeholder="Ejemplo: 2196" 
                       style="text-transform: uppercase;" 
                       oninput="this.value = this.value.toUpperCase();"
                       autocomplete="off">
            </div>

            <div class="form-group">
                <label>📍 Calle / Dirección (opcional)</label>
                <input type="text" id="direccion" 
                       placeholder="Ej: Av. Principal #123, Colonia Centro" 
                       style="text-transform: uppercase;" 
                       oninput="this.value = this.value.toUpperCase();"
                       autocomplete="off">
            </div>
    
                <!-- NUEVOS CAMPOS OPCIONALES -->
            <div class="form-group">
                <label>📊 Nivel de Interés</label>
                <select id="nivelInteres" class="form-control">
                    <option value="">-- SELECCIONAR --</option>
                    <option value="CONVENCIDO">✅ CONVENCIDO</option>
                    <option value="INDECISO">🤔 INDECISO</option>
                    <option value="RENUENTE">❌ RENUENTE</option>
                    <option value="LE INTERESA">📌 LE INTERESA</option>
                </select>
            </div>

            <div class="form-group">
                <label>👨‍👩‍👧‍👦 Número de personas en el hogar</label>
                <select id="numPersonas" class="form-control">
                    <option value="">-- SELECCIONAR --</option>
                    <option value="1">1 persona</option>
                    <option value="2">2 personas</option>
                    <option value="3">3 personas</option>
                    <option value="4">4 personas</option>
                    <option value="5">5 personas</option>
                    <option value="6">6 personas</option>
                    <option value="7">7 personas</option>
                    <option value="8">8 personas</option>
                    <option value="9">9 personas</option>
                    <option value="10">10 personas</option>
                    <option value="MAS DE 11">+11 personas</option>
                </select>
            </div>

            <div class="form-group">
                <label>🔍 Verificación del número (Opcional)</label>
                <select id="verificacion" class="form-control">
                    <option value="">-- SELECCIONAR --</option>
                    <option value="VERIFICADO">✅ VERIFICADO</option>
                    <option value="NO VERIFICADO">❌ NO VERIFICADO</option>
                    <option value="NO DISPONIBLE">📵 NO DISPONIBLE</option>
                    <option value="NUMERO FALSO">🚫 NÚMERO FALSO</option>
                </select>
            </div>
    
            
            </form>

        </div>


        

        <!-- Sección Mis Visitas -->
        <div id="visitasSection" class="hidden">
            <div class="export-buttons">
                <button id="myVisitsExcelBtn" class="btn btn-success"><i class="fas fa-file-excel"></i> Mi Excel</button>
            </div>


          <!-- DASHBOARD DE BRIGADISTAS COMPACTO -->
<div id="brigadistasDashboard" style="background: white; border-radius: 12px; padding: 8px 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
    <h3 style="margin: 0 0 8px 0; font-size: 14px; color: #333;"><i class="fas fa-chart-bar" style="font-size: 12px;"></i> Top Brigadistas</h3>
    <div id="dashboardStats" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;">
        <div style="text-align: center; padding: 8px; font-size: 11px; color: #999;">Cargando...</div>
    </div>
</div>

            
            <div class="stats-grid" id="statsContainer"></div>
            <div class="filters">
                <select id="filterColonia">
                    <option value="">Todas las colonias</option>
                </select>
                <select id="filterTelefono">
                    <option value="todos">Todos</option>
                    <option value="con">Con teléfono</option>
                    <option value="sin">Sin teléfono</option>
                </select>
                <input type="date" id="filterFecha">
                <input type="text" id="filterSearch" placeholder="Buscar...">
                <button class="btn btn-primary" id="resetFilters">Reset</button>
            </div>
            <div id="visitasList" class="visitas-list"></div>
        </div>

        <!-- Sección Admin -->
        <div id="adminSection" class="hidden">
            <div class="export-buttons">
                <button id="exportAllPdfBtn" class="btn btn-primary"><i class="fas fa-file-pdf"></i>PDF</button>
                <button id="exportAllExcelBtn" class="btn btn-success"><i class="fas fa-file-excel"></i> Excel</button>
            </div>

                        <!-- ESTADÍSTICAS GLOBALES ADMIN -->
            <div id="adminGlobalStats" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px;">
                <div style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px; border-radius: 12px; text-align: center;">
                    <div style="font-size: 11px; opacity: 0.9;">TOTAL VISITAS</div>
                    <div style="font-size: 28px; font-weight: bold;" id="adminTotalVisitas">0</div>
                </div>
                <div style="background: #10b981; color: white; padding: 12px; border-radius: 12px; text-align: center;">
                    <div style="font-size: 11px; opacity: 0.9;">CON TELÉFONO</div>
                    <div style="font-size: 28px; font-weight: bold;" id="adminTotalTelefono">0</div>
                </div>
                <div style="background: #f59e0b; color: white; padding: 12px; border-radius: 12px; text-align: center;">
                    <div style="font-size: 11px; opacity: 0.9;">COLONIAS VISITADAS</div>
                    <div style="font-size: 28px; font-weight: bold;" id="adminTotalColonias">0</div>
                    <div style="font-size: 10px; margin-top: 5px;" id="adminColoniasDetalle"></div>
                </div>
            </div>

            
            
            <div class="form-group">
                <input type="text" id="searchBrigadista" placeholder="Buscar brigadista...">
            </div>
            <div id="brigadistasList" class="brigadistas-list"></div>
        </div>


        
        

        
         <div class="header">
    <div class="user-info" id="userInfoContainer">
        <i class="fas fa-hand-holding-heart" style="font-size: 30px; color: #667eea;"></i>
        <span id="userNameDisplay" class="user-badge">Cargando...</span>
        <span id="adminBadge" class="user-badge admin-badge hidden">👑 Admin</span>
    </div>

        function setupPWAInstall() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBanner = document.getElementById('installBanner');
                const installBtn = document.getElementById('installBtn');
                installBanner.classList.remove('hidden');
                installBtn.classList.remove('hidden');
            });

            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                document.getElementById('installBanner').classList.add('hidden');
                document.getElementById('installBtn').classList.add('hidden');
                Swal.fire('¡Instalado!', 'La aplicación se ha instalado correctamente', 'success');
            });

            document.getElementById('installNowBtn')?.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            document.getElementById('installBanner').classList.add('hidden');
                        }
                        deferredPrompt = null;
                    });
                }
            });

            document.getElementById('installBtn')?.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                }
            });

            if (window.matchMedia('(display-mode: standalone)').matches) {
                document.getElementById('installBanner').classList.add('hidden');
                document.getElementById('installBtn').classList.add('hidden');
            }

        function loadPendingQueue() {
            const saved = localStorage.getItem('pendingQueue');
            if (saved) {
                pendingQueue = JSON.parse(saved);
                updatePendingBadge();
            }
        }

        function savePendingQueue() {
            localStorage.setItem('pendingQueue', JSON.stringify(pendingQueue));
            updatePendingBadge();
        }

        function addToPendingQueue(operation) {
            pendingQueue.push({ ...operation, id: Date.now() });
            savePendingQueue();
            Swal.fire({
                icon: 'info',
                title: 'Sin conexión',
                text: 'Operación guardada, se sincronizará automáticamente.',
                toast: true,
                showConfirmButton: false,
                timer: 2000
            });
        }

        async function processPendingQueue() {
            if (!online || pendingQueue.length === 0) return;
            
            Swal.fire({
                title: 'Sincronizando...',
                text: `${pendingQueue.length} operaciones pendientes`,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            const queueCopy = [...pendingQueue];
            pendingQueue = [];
            savePendingQueue();
            
            for (const op of queueCopy) {
                try {
                    await executeOperation(op);
                } catch (error) {
                    console.error('Error en operación:', error);
                    pendingQueue.push(op);
                }
            }
            savePendingQueue();
            Swal.close();
            
            if (pendingQueue.length === 0) {
                Swal.fire('¡Sincronizado!', 'Todas las operaciones se completaron', 'success');
            }
            await loadMisVisitas();
        }

        async function executeOperation(op) {
            switch (op.type) {
                case 'create':
                    await guardarEnFirebase(op.data);
                    break;
                case 'update':
                    await actualizarEnFirebase(op.id, op.data);
                    break;
                case 'delete':
                    await eliminarEnFirebase(op.id);
                    break;
            }
        }

                // Función para cargar dashboard de brigadistas
        async function loadBrigadistasDashboard() {
    if (!currentUser) return;
    
    try {
        const dashboardContainer = document.getElementById('dashboardStats');
        if (dashboardContainer) {
            dashboardContainer.innerHTML = '<div style="text-align: center; padding: 8px; color: #999; font-size: 11px;">Cargando top brigadistas...</div>';
        }
        
        // Obtener todos los brigadistas
        const snapshot = await database.ref('usuarios').once('value');
        const brigadistas = [];
        snapshot.forEach(child => {
            brigadistas.push({ uid: child.key, nombre: child.val().nombre });
        });
        
        if (brigadistas.length === 0) {
            if (dashboardContainer) {
                dashboardContainer.innerHTML = '<div style="text-align: center; padding: 8px; color: #999; font-size: 11px;">Sin brigadistas</div>';
            }
            return;
        }
        
        // Para cada brigadista, contar TODAS LAS VISITAS (total de registros)
        const brigadistasConTotal = [];
        
        for (const b of brigadistas) {
            try {
                const visitsSnap = await database.ref(`visitas/${b.uid}`).once('value');
                
                // CONTAR TODOS LOS REGISTROS - SIMPLE Y DIRECTO
                let totalVisitas = 0;
                if (visitsSnap.exists()) {
                    visitsSnap.forEach(() => {
                        totalVisitas++; // CADA REGISTRO CUENTA
                    });
                }
                
                brigadistasConTotal.push({
                    nombre: b.nombre,
                    total: totalVisitas,
                    uid: b.uid
                });
                
            } catch (error) {
                console.error(`Error en ${b.nombre}:`, error);
                brigadistasConTotal.push({
                    nombre: b.nombre,
                    total: 0,
                    uid: b.uid
                });
            }
        }
        
        // Ordenar por TOTAL DE VISITAS (mayor a menor)
        brigadistasConTotal.sort((a, b) => b.total - a.total);
        
        // Mostrar en el dashboard
        if (dashboardContainer) {
            if (brigadistasConTotal.length === 0) {
                dashboardContainer.innerHTML = '<div style="text-align: center; padding: 8px; color: #999; font-size: 11px;">Sin datos</div>';
                return;
            }
            
            const maxToShow = 12;
            const topBrigadistas = brigadistasConTotal.slice(0, maxToShow);
            
            dashboardContainer.innerHTML = topBrigadistas.map((b, index) => `
    <div style="background: ${b.uid === currentUser?.uid ? 'linear-gradient(135deg, #667eea20, #764ba220)' : '#f8f9fa'}; 
                padding: 10px 4px; 
                border-radius: 10px; 
                text-align: center; 
                border: ${b.uid === currentUser?.uid ? '2px solid #667eea' : '1px solid #e9ecef'};
                transition: all 0.2s;
                position: relative;
                min-height: 85px;">
        ${index === 0 && b.total > 0 ? '<div style="position: absolute; top: -8px; right: -5px; font-size: 18px;">🏆</div>' : ''}
        <div style="font-size: 10px; 
                    font-weight: 600; 
                    color: ${b.uid === currentUser?.uid ? '#667eea' : '#495057'}; 
                    line-height: 1.3;
                    min-height: 32px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    text-align: center;
                    word-break: break-word;
                    white-space: normal;"
             title="${escapeHtml(b.nombre)}">
            ${b.uid === currentUser?.uid ? '⭐ ' : ''}${index + 1}. ${escapeHtml(b.nombre)}
        </div>
        <div style="font-size: 22px; 
                    font-weight: bold; 
                    color: ${b.uid === currentUser?.uid ? '#667eea' : '#333'}; 
                    line-height: 1.2;
                    margin: 5px 0;">
            ${b.total}
        </div>
        <div style="font-size: 8px; color: #6c757d;">VISITAS TOTALES</div>
    </div>
`).join('');
        }
        
    } catch (error) {
        console.error('Error cargando dashboard:', error);
        const dashboardContainer = document.getElementById('dashboardStats');
        if (dashboardContainer) {
            dashboardContainer.innerHTML = '<div style="text-align: center; padding: 8px; color: #ef4444; font-size: 11px;">⚠️ Error al cargar</div>';
        }
    }
}
        

        async function guardarVisita(e) {
            e.preventDefault();
            const nombre = document.getElementById('personaNombre').value.trim();
            // Validación de teléfono a 10 dígitos
            const telefono = document.getElementById('personaTelefono').value.trim();
            if (telefono && telefono.length !== 10) {
                Swal.fire('Error', `El número de teléfono debe tener exactamente 10 dígitos. Actualmente tiene ${telefono.length} dígitos.`, 'error');
                return;
            }
            if (!nombre) return Swal.fire('Error', 'El nombre es obligatorio', 'error');
            
            const data = {
                nombre: nombre,
                telefono: document.getElementById('personaTelefono').value,
colonia: document.getElementById('personaColonia').value.toUpperCase(),
                fecha: new Date().toISOString(),
                brigadistaId: currentUser.uid,
                brigadistaNombre: currentUser.nombre,
                numCalle: document.getElementById('numCalle').value,
                direccion: document.getElementById('direccion').value,
                nivelInteres: document.getElementById('nivelInteres').value,
                numPersonas: document.getElementById('numPersonas').value,
                verificacion: document.getElementById('verificacion').value
            };
            

            
            if (editandoId) {
    data.editado = true;
    if (online) {
        await actualizarEnFirebase(editandoId, data);
        vibrarFuerte();
        Swal.fire('Actualizado', 'Registro actualizado', 'success');
    } else {
        addToPendingQueue({ type: 'update', id: editandoId, data });
        vibrarFuerte();
        Swal.fire('Actualización pendiente', 'Se actualizará cuando haya conexión', 'info');
    }
    cancelarEdicion();  // Esta línea es importante
} else {
    if (online) {
        await guardarEnFirebase(data);
        vibrarFuerte();
        Swal.fire('Guardado', 'Registro guardado', 'success');
    } else {
        addToPendingQueue({ type: 'create', data });
        vibrarFuerte();
    }
}
            
            resetFormulario();
            if (!document.getElementById('visitasSection').classList.contains('hidden')) {
                await loadMisVisitas();
            }
            if (data.colonia) await agregarColoniaGlobal(data.colonia);
        }

        async function guardarEnFirebase(data) {
            const newRef = database.ref(`visitas/${currentUser.uid}`).push();
            await newRef.set(data);
            return newRef.key;
        }

        async function actualizarEnFirebase(id, data) {
            await database.ref(`visitas/${currentUser.uid}/${id}`).update(data);
        }

        async function eliminarEnFirebase(id) {
            await database.ref(`visitas/${currentUser.uid}/${id}`).remove();
        }

        async function eliminarVisita(id) {
            const result = await Swal.fire({
                title: '¿Eliminar?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sí, eliminar'
            });
            
            if (result.isConfirmed) {
                if (online) {
                    await eliminarEnFirebase(id);
                    vibrarFuerte();
                    Swal.fire('Eliminado', '', 'success');
                } else {
                    addToPendingQueue({ type: 'delete', id });
                    vibrarFuerte();
                    Swal.fire('Eliminación pendiente', 'Se eliminará cuando haya conexión', 'info');
                }
                await loadMisVisitas();
            }
        }

            document.getElementById('personaTelefono').value = visita.telefono || '';

            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('updateBtn').classList.remove('hidden');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            editandoId = visita.id;
            
            switchSection('registro');
        }

        async function loadMisVisitas() {
            if (!currentUser) return;
            
            try {
                const snapshot = await database.ref(`visitas/${currentUser.uid}`).once('value');
                allVisitas = [];
                snapshot.forEach(child => {
                    allVisitas.push({ id: child.key, ...child.val() });

        function exportBrigadistaExcel(visitas, nombre) {
    const data = visitas.map(v => ({
        Nombre: v.nombre,
        Teléfono: v.telefono || '',
        Colonia: v.colonia || '',
        Fecha: new Date(v.fecha).toLocaleString()
    }));
    
    const ws = XLSX.utils.json_to_sheet(data);
    
    // 🔥 AGREGAR BORDES A TODAS LAS CELDAS
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:D1');
    for (let R = range.s.r; R <= range.e.r; ++R) {
        for (let C = range.s.c; C <= range.e.c; ++C) {
            const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
            if (!ws[cellAddress]) continue;
            ws[cellAddress].s = {
                border: {
                    top: { style: 'thin', color: { rgb: '000000' } },
                    bottom: { style: 'thin', color: { rgb: '000000' } },
                    left: { style: 'thin', color: { rgb: '000000' } },
                    right: { style: 'thin', color: { rgb: '000000' } }
                },
                alignment: { vertical: 'center', horizontal: 'left' },
                font: { sz: 11, name: 'Arial' }
            };
        }
    }
    
    // 🔥 ESTILO CABECERA
    for (let C = range.s.c; C <= range.e.c; ++C) {
        const cellAddress = XLSX.utils.encode_cell({ r: range.s.r, c: C });
        if (ws[cellAddress]) {
            ws[cellAddress].s = {
                font: { bold: true, sz: 12, name: 'Arial', color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: '4472C4' } },
                border: {
                    top: { style: 'thin', color: { rgb: '000000' } },
                    bottom: { style: 'thin', color: { rgb: '000000' } },
                    left: { style: 'thin', color: { rgb: '000000' } },
                    right: { style: 'thin', color: { rgb: '000000' } }
                },
                alignment: { vertical: 'center', horizontal: 'center' }
            };
        }
    }
    
    // 🔥 AUTO AJUSTAR ANCHO DE COLUMNAS
    const colWidths = [];
    for (let C = range.s.c; C <= range.e.c; ++C) {
        let maxWidth = 0;
        for (let R = range.s.r; R <= range.e.r; ++R) {
            const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
            const cellValue = ws[cellAddress] ? ws[cellAddress].v : '';
            const cellLength = String(cellValue).length;
            if (cellLength > maxWidth) maxWidth = Math.min(cellLength, 50);
        }
        colWidths.push({ wch: maxWidth + 3 });
    }
    ws['!cols'] = colWidths;
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Visitas');
    XLSX.writeFile(wb, `visitas_${nombre}_${new Date().toISOString().slice(0,10)}.xlsx`);
    Swal.fire('Exportado', `Excel de ${nombre} generado con formato profesional`, 'success');
}

        function exportAllToPDF() {

        didOpen: () => Swal.showLoading()
    });
    
    // Recopilar TODOS los datos
    const allData = [];
    const promises = [];
    
    database.ref('usuarios').once('value').then(usuariosSnapshot => {
        const usuarios = [];
        usuariosSnapshot.forEach(child => {
            usuarios.push({ uid: child.key, nombre: child.val().nombre });
        });
        
        usuarios.forEach(usuario => {
            promises.push(
                database.ref(`visitas/${usuario.uid}`).once('value').then(visitasSnapshot => {
                    visitasSnapshot.forEach(visita => {
                                                                       allData.push({
                            Nombre: visita.val().nombre,
                            Telefono: visita.val().telefono || '',
                            Colonia: visita.val().colonia || '',
                            NumCalle: visita.val().numCalle || '',
                            Direccion: visita.val().direccion || '',

                            NumPersonas: visita.val().numPersonas || '',
                            Verificacion: visita.val().verificacion || ''
                        });
                    });
                })
            );
        });
        
        Promise.all(promises).then(() => {
            // Ordenar por fecha
            allData.sort((a, b) => new Date(b.Fecha) - new Date(a.Fecha));
            
            // Crear PDF horizontal
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });
            
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 10;
            let startY = 30;
            const rowHeight = 8;
            
            // Definir columnas
                                   const columns = [
                { header: 'NOMBRE', width: 30 },
                { header: 'TELÉFONO', width: 25 },
                { header: 'COLONIA', width: 30 },
                { header: 'NÚMERO/CALLE', width: 25 },
                { header: 'DIRECCIÓN', width: 35 },
                { header: 'FECHA', width: 35 },
                { header: 'BRIGADISTA', width: 30 },
                { header: 'NIVEL INTERÉS', width: 25 },
                { header: '# PERSONAS', width: 20 },
                { header: 'VERIFICACIÓN', width: 25 }
            ];
            
            const totalWidth = columns.reduce((sum, col) => sum + col.width, 0);
            const startX = (pageWidth - totalWidth) / 2;
            let currentY = startY;
            
            // Título
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text('REPORTE GENERAL DE VISITAS', pageWidth / 2, 15, { align: 'center' });
            
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text(`Generado: ${new Date().toLocaleString()}`, pageWidth / 2, 22, { align: 'center' });
            doc.text(`Total de registros: ${allData.length}`, pageWidth / 2, 28, { align: 'center' });
            
            // Cabecera
            doc.setFontSize(9);
            doc.setFont('helvetica', 'bold');
            doc.setFillColor(68, 114, 196);
            doc.setTextColor(255, 255, 255);
            
            let currentX = startX;
            columns.forEach(col => {
                doc.rect(currentX, currentY, col.width, rowHeight, 'F');
                doc.text(col.header, currentX + 2, currentY + 5);
                currentX += col.width;
            });
            currentY += rowHeight;
            
            // Datos
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.setTextColor(0, 0, 0);
            
            for (let i = 0; i < allData.length; i++) {
                const item = allData[i];
                
                if (currentY + rowHeight > pageHeight - margin) {
                    doc.addPage();
                    currentY = margin;
                    
                    // Redibujar cabecera
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'bold');
                    doc.setFillColor(68, 114, 196);
                    doc.setTextColor(255, 255, 255);
                    currentX = startX;
                    columns.forEach(col => {
                        doc.rect(currentX, currentY, col.width, rowHeight, 'F');
                        doc.text(col.header, currentX + 2, currentY + 5);
                        currentX += col.width;
                    });
                    currentY += rowHeight;
                    doc.setFontSize(8);
                    doc.setFont('helvetica', 'normal');
                    doc.setTextColor(0, 0, 0);
                }
                
                               currentX = startX;
                
                // Filas alternadas
                if (i % 2 === 0) {
                    doc.setFillColor(245, 245, 245);
                    doc.rect(currentX, currentY, totalWidth, rowHeight, 'F');
                }
                                // Columna 1: NOMBRE
                doc.text(item.Nombre.length > 20 ? item.Nombre.substring(0, 17) + '...' : item.Nombre, currentX + 2, currentY + 5);
                currentX += columns[0].width;
                
                // Columna 2: TELÉFONO
                doc.text(item.Telefono || '-', currentX + 2, currentY + 5);
                currentX += columns[1].width;
                
                // Columna 3: COLONIA
                doc.text(item.Colonia.length > 20 ? item.Colonia.substring(0, 17) + '...' : item.Colonia || '-', currentX + 2, currentY + 5);
                currentX += columns[2].width;
                
                // 🆕 Columna 4: NÚMERO/CALLE
                doc.text(item.NumCalle || '-', currentX + 2, currentY + 5);
                currentX += columns[3].width;
                
                // 🆕 Columna 5: DIRECCIÓN
                doc.text(item.Direccion ? (item.Direccion.length > 22 ? item.Direccion.substring(0, 19) + '...' : item.Direccion) : '-', currentX + 2, currentY + 5);
                currentX += columns[4].width;
                
                // Columna 6: FECHA
                doc.text(item.Fecha, currentX + 2, currentY + 5);
                currentX += columns[5].width;
                
                // Columna 7: BRIGADISTA
                doc.text(item.Brigadista.length > 20 ? item.Brigadista.substring(0, 17) + '...' : item.Brigadista, currentX + 2, currentY + 5);
                currentX += columns[6].width;
                
                // Columna 8: NIVEL INTERÉS
                doc.text(item.NivelInteres || '-', currentX + 2, currentY + 5);
                currentX += columns[7].width;
                
                // Columna 9: # PERSONAS
                doc.text(item.NumPersonas || '-', currentX + 2, currentY + 5);
                currentX += columns[8].width;
                
                // Columna 10: VERIFICACIÓN
                doc.text(item.Verificacion || '-', currentX + 2, currentY + 5);
                
                currentY += rowHeight;
            }
            
            // Pie de página
            const totalPages = doc.internal.getNumberOfPages();
            for (let i = 1; i <= totalPages; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.setTextColor(128, 128, 128);
                doc.text(`Página ${i} de ${totalPages}`, pageWidth / 2, pageHeight - 5, { align: 'center' });
            }
            
            doc.save(`reporte_visitas_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.pdf`);
            Swal.fire('PDF Generado', 'Reporte descargado con formato profesional', 'success');
        });
    });
}

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function debounce(fn, delay) {
            let timeout;
            return function() {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, arguments), delay);
            };
        }

function vibrarFuerte() {
    if ('vibrate' in navigator) {
        // Patrón de vibración fuerte: 200ms vibra, 100ms pausa, 200ms vibra, 100ms pausa, 200ms vibra
        navigator.vibrate([200, 100, 200, 100, 200]);
        
        // También intentar vibración más fuerte si soporta (solo algunos navegadores)
        if (navigator.vibrate([500])) {
            setTimeout(() => navigator.vibrate([300]), 50);
        }
    } else {
        console.log("Este dispositivo no soporta vibración");
    }
}
