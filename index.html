<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="Sistema de Gestión de Brigadistas - Offline First">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192?text=App">
    <title>Sistema Brigadistas | Gestión Offline</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-badge {
            background: #ef4444;
        }

        .btn-logout {
            background: #6b7280;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #4b5563;
            transform: translateY(-2px);
        }

        .btn-install {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .install-banner {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .install-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(16,185,129,0.3);
        }

        .install-banner.hidden {
            display: none;
        }

        /* Banner Offline */
        .offline-banner {
            background: #f59e0b;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .offline-banner.online {
            background: #10b981;
        }

        /* Formulario */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group datalist, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
            margin-top: 10px;
        }
        .btn-large {
    padding: 18px 32px;
    font-size: 20px;
    font-weight: 800;
    border-radius: 16px;
    min-width: 200px;
    margin: 5px;
}

.btn-large i {
    margin-right: 10px;
    font-size: 22px;
}

/* Estilo para grupo de botones */
.btn-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

        .btn {
    padding: 16px 28px;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    min-width: 160px;
}

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        /* Estadísticas */
       .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 28px;
            margin-bottom: 5px;
            color: #333;
        }

        /* Filtros */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filters select, .filters input {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
        }

        /* Lista de visitas */
        .visitas-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .visita-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .visita-card:hover {
            transform: translateY(-2px);
        }

        .visita-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .visita-nombre {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .visita-fecha {
            color: #666;
            font-size: 12px;
        }

        .visita-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-icon {
            padding: 8px 12px;
            font-size: 14px;
        }

        /* Menú flotante moderno */
        .floating-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            box-shadow: 0 -5px 30px rgba(0,0,0,0.15);
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .menu-item {
            text-align: center;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .menu-item svg {
            width: 24px;
            height: 24px;
            stroke: #667eea;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.3s;
        }

        .menu-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .menu-item.active svg {
            stroke: white;
        }

        .menu-item.active span {
            color: white;
        }

        .menu-item span {
            font-size: 11px;
            color: #666;
            font-weight: 500;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
    background: rgba(0,0,0,0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: modalFadeIn 0.3s;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Admin Panel */
        .brigadistas-list {
            display: grid;
            gap: 15px;
        }

        .brigadista-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .brigadista-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 15px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .menu-item {
                padding: 8px 12px;
            }
        }

        .hidden {
            display: none;
        }

        .pending-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 8px;
            border-radius: 50px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <i class="fas fa-hand-holding-heart" style="font-size: 30px; color: #667eea;"></i>
                <span id="userNameDisplay" class="user-badge">Cargando...</span>

            <div>
                <button id="logoutBtn" class="btn-logout hidden"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
                <button id="installBtn" class="btn-install hidden"><i class="fas fa-download"></i> Instalar App</button>
            </div>
        </div>

        <!-- Banner de instalación PWA -->

            </div>

        </div>

        <div id="offlineBanner" class="offline-banner online">
            <i class="fas fa-wifi"></i>
            <span>Online</span>
            <span id="pendingCount" class="pending-badge hidden">0 pendientes</span>
        </div>

        <!-- Sección Registro -->
        <div id="registroSection" class="form-card">
            <h2><i class="fas fa-user-plus"></i> Registrar Visita</h2>
            <form id="visitaForm">
                <div class="form-group">
                    <label>Nombre completo *</label>
<input type="text" id="personaNombre" required placeholder="NOMBRE DE LA PERSONA" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase();">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="personaTelefono" placeholder="Opcional">
                </div>
                <div class="form-group">
                    <label>Colonia</label>
                    <input type="text" id="personaColonia" list="coloniasList" placeholder="Colonia">
                    <datalist id="coloniasList"></datalist>
                </div>
                <div class="form-group">
                    <label>Fotografía</label>
                    <input type="file" id="personaFoto" accept="image/*">
                    <img id="imagePreview" class="image-preview" style="display: none;">
                </div>

            <div class="btn-group">
    <button type="submit" class="btn btn-primary btn-large" id="submitBtn"><i class="fas fa-save"></i> GUARDAR VISITA</button>
    <button type="button" class="btn btn-success btn-large hidden" id="updateBtn"><i class="fas fa-edit"></i> ACTUALIZAR</button>
    <button type="button" class="btn btn-danger btn-large hidden" id="cancelEditBtn"><i class="fas fa-times"></i> CANCELAR</button>
</div>
            
            </form>
        </div>

        <!-- Sección Mis Visitas -->
        <div id="visitasSection" class="hidden">
            <div class="export-buttons">
                <button id="myVisitsExcelBtn" class="btn btn-success"><i class="fas fa-file-excel"></i> Mi Excel</button>
            </div>
            <div class="stats-grid" id="statsContainer"></div>
            <div class="filters">
                <select id="filterColonia">
                    <option value="">Todas las colonias</option>
                </select>
                <select id="filterTelefono">
                    <option value="todos">Todos</option>
                    <option value="con">Con teléfono</option>
                    <option value="sin">Sin teléfono</option>
                </select>
                <input type="date" id="filterFecha">
                <input type="text" id="filterSearch" placeholder="Buscar...">
                <button class="btn btn-primary" id="resetFilters">Reset</button>
            </div>
            <div id="visitasList" class="visitas-list"></div>
        </div>

        <!-- Sección Admin -->
        <div id="adminSection" class="hidden">
            <div class="export-buttons">
                <button id="exportAllPdfBtn" class="btn btn-primary"><i class="fas fa-file-pdf"></i> Todo PDF</button>
                <button id="exportAllExcelBtn" class="btn btn-success"><i class="fas fa-file-excel"></i> Todo Excel</button>
            </div>
            <div class="form-group">
                <input type="text" id="searchBrigadista" placeholder="Buscar brigadista...">
            </div>
            <div id="brigadistasList" class="brigadistas-list"></div>
        </div>
    </div>

    <!-- Menú Flotante con SVG Icons -->
    <div class="floating-menu">
        <div class="menu-item" data-section="registro">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
            <span>Registro</span>
        </div>
        <div class="menu-item" data-section="visitas">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 6h18M9 12h6M7 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
            <span>Visitas</span>
        </div>
        <div class="menu-item admin-only hidden" data-section="admin">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="18" cy="8" r="2" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M22 14c0-1.33-2.67-2-4-2" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Admin</span>
        </div>
    </div>

    <!-- Modal Bienvenida -->
    <div id="welcomeModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-hand-holding-heart" style="font-size: 50px; color: #667eea;"></i>
            <h2>¡Bienvenido Brigadista!</h2>
            <p>Ingresa tu nombre completo para continuar</p>
            <div class="form-group">
<input type="text" id="brigadistaNombre" placeholder="NOMBRE COMPLETO" required style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase();">
            </div>
            <button class="btn btn-primary" id="confirmarAcceso">Acceder</button>
        </div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAiojpfnGUPhaoQkpAh1Yey3fp6uWU-iFQ",
            authDomain: "aplicacion-2c1c8.firebaseapp.com",
            databaseURL: "https://aplicacion-2c1c8.firebaseio.com",
            projectId: "aplicacion-2c1c8",
            storageBucket: "aplicacion-2c1c8.firebasestorage.app",
            messagingSenderId: "837629411067",
            appId: "1:837629411067:web:6c96cfcd7490b049787a5e"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variables Globales
        let currentUser = null;
        let isAdmin = false;
        let pendingQueue = [];
        let online = navigator.onLine;
        let editandoId = null;
        let allVisitas = [];
        let allColonias = [];
        let deferredPrompt = null;

        // Inicialización
        async function init() {
            loadPendingQueue();
            updateOnlineStatus();
            setupEventListeners();
            checkSavedSession();
            setupPWAInstall();
            
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', () => updateOnlineStatus(false));
            
            await loadGlobalColonias();
        }

        function setupPWAInstall() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBanner = document.getElementById('installBanner');
                const installBtn = document.getElementById('installBtn');
                installBanner.classList.remove('hidden');
                installBtn.classList.remove('hidden');
            });

            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                document.getElementById('installBanner').classList.add('hidden');
                document.getElementById('installBtn').classList.add('hidden');
                Swal.fire('¡Instalado!', 'La aplicación se ha instalado correctamente', 'success');
            });

            document.getElementById('installNowBtn')?.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            document.getElementById('installBanner').classList.add('hidden');
                        }
                        deferredPrompt = null;
                    });
                }
            });

            document.getElementById('installBtn')?.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                }
            });

            if (window.matchMedia('(display-mode: standalone)').matches) {
                document.getElementById('installBanner').classList.add('hidden');
                document.getElementById('installBtn').classList.add('hidden');
            }
        }

        function loadPendingQueue() {
            const saved = localStorage.getItem('pendingQueue');
            if (saved) {
                pendingQueue = JSON.parse(saved);
                updatePendingBadge();
            }
        }

        function savePendingQueue() {
            localStorage.setItem('pendingQueue', JSON.stringify(pendingQueue));
            updatePendingBadge();
        }

        function addToPendingQueue(operation) {
            pendingQueue.push({ ...operation, id: Date.now() });
            savePendingQueue();
            Swal.fire({
                icon: 'info',
                title: 'Sin conexión',
                text: 'Operación guardada, se sincronizará automáticamente.',
                toast: true,
                showConfirmButton: false,
                timer: 2000
            });
        }

        async function processPendingQueue() {
            if (!online || pendingQueue.length === 0) return;
            
            Swal.fire({
                title: 'Sincronizando...',
                text: `${pendingQueue.length} operaciones pendientes`,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            const queueCopy = [...pendingQueue];
            pendingQueue = [];
            savePendingQueue();
            
            for (const op of queueCopy) {
                try {
                    await executeOperation(op);
                } catch (error) {
                    console.error('Error en operación:', error);
                    pendingQueue.push(op);
                }
            }
            savePendingQueue();
            Swal.close();
            
            if (pendingQueue.length === 0) {
                Swal.fire('¡Sincronizado!', 'Todas las operaciones se completaron', 'success');
            }
            await loadMisVisitas();
        }

        async function executeOperation(op) {
            switch (op.type) {
                case 'create':
                    await guardarEnFirebase(op.data);
                    break;
                case 'update':
                    await actualizarEnFirebase(op.id, op.data);
                    break;
                case 'delete':
                    await eliminarEnFirebase(op.id);
                    break;
            }
        }

        async function handleOnline() {
            updateOnlineStatus(true);
            await processPendingQueue();
            await loadMisVisitas();
            if (currentUser) await loadGlobalColonias();
        }

        function updateOnlineStatus(isOnline = navigator.onLine) {
            online = isOnline;
            const banner = document.getElementById('offlineBanner');
            if (online) {
                banner.className = 'offline-banner online';
                banner.innerHTML = '<i class="fas fa-wifi"></i><span>Online</span><span id="pendingCount" class="pending-badge hidden"></span>';
            } else {
                banner.className = 'offline-banner';
                banner.innerHTML = '<i class="fas fa-plug"></i><span>Offline - Modo sin conexión</span><span id="pendingCount" class="pending-badge"></span>';
            }
            updatePendingBadge();
        }

        function updatePendingBadge() {
            const pendingSpan = document.getElementById('pendingCount');
            if (pendingQueue.length > 0) {
                pendingSpan.textContent = `${pendingQueue.length} pendientes`;
                pendingSpan.classList.remove('hidden');
            } else {
                pendingSpan.classList.add('hidden');
            }
        }

        function cerrarSesion() {
            Swal.fire({
                title: '¿Cerrar sesión?',
                text: 'Se borrarán los datos locales',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sí, cerrar sesión'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('currentUser');
                    localStorage.removeItem('pendingQueue');
                    currentUser = null;
                    isAdmin = false;
                    editandoId = null;
                    allVisitas = [];
                    location.reload();
                }
            });
        }

        function setupEventListeners() {
            document.getElementById('visitaForm').addEventListener('submit', guardarVisita);
            document.getElementById('cancelEditBtn').addEventListener('click', cancelarEdicion);
                document.getElementById('updateBtn').addEventListener('click', guardarVisita);  
            document.getElementById('resetFilters').addEventListener('click', resetFilters);
            document.getElementById('exportAllPdfBtn')?.addEventListener('click', () => exportAllToPDF());
            document.getElementById('exportAllExcelBtn')?.addEventListener('click', () => exportAllToExcel());
            document.getElementById('myVisitsExcelBtn')?.addEventListener('click', () => exportMyVisitsToExcel());
            document.getElementById('searchBrigadista')?.addEventListener('input', debounce(loadBrigadistas, 300));
            document.getElementById('logoutBtn')?.addEventListener('click', cerrarSesion);
            
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', () => switchSection(item.dataset.section));
            });
            
            document.getElementById('confirmarAcceso').addEventListener('click', registrarBrigadista);
            document.getElementById('personaFoto').addEventListener('change', previewImage);
            
            ['filterColonia', 'filterTelefono', 'filterFecha', 'filterSearch'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', () => renderVisitasList());
            });
        }

        function switchSection(section) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.menu-item[data-section="${section}"]`).classList.add('active');
            
            document.getElementById('registroSection').classList.add('hidden');
            document.getElementById('visitasSection').classList.add('hidden');
            document.getElementById('adminSection').classList.add('hidden');
            
            document.getElementById(`${section}Section`).classList.remove('hidden');
            
            if (section === 'visitas') loadMisVisitas();
            if (section === 'admin' && isAdmin) loadBrigadistas();
        }

        async function checkSavedSession() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                await verificarAdminStatus();
                document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${currentUser.nombre}`;
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('welcomeModal').style.display = 'none';
                switchSection('registro');
                await loadGlobalColonias();
            } else {
                document.getElementById('welcomeModal').style.display = 'flex';
            }
        }

        async function registrarBrigadista() {
            const nombre = document.getElementById('brigadistaNombre').value.trim();
            if (!nombre) {
                Swal.fire('Error', 'Ingresa tu nombre completo', 'error');
                return;
            }
            
            try {
                const usuariosRef = database.ref('usuarios');
                const snapshot = await usuariosRef.orderByChild('nombre').equalTo(nombre).once('value');
                let uid, esAdmin = false;
                
                if (snapshot.exists()) {
                    const [key, userData] = Object.entries(snapshot.val())[0];
                    uid = key;
                    esAdmin = userData.administrador || false;
                    Swal.fire('Bienvenido', `Hola de nuevo ${nombre}`, 'success');
                } else {
                    uid = Date.now().toString();
                    await usuariosRef.child(uid).set({
                        nombre: nombre,
                        creado: Date.now()
                    });
                    Swal.fire('Registro exitoso', `Bienvenido ${nombre}`, 'success');
                }
                
                currentUser = { uid, nombre, administrador: esAdmin };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                isAdmin = esAdmin;
                
                if (isAdmin) {
                    document.getElementById('adminBadge').classList.remove('hidden');
                    document.querySelector('.admin-only').classList.remove('hidden');
                }
                
                document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${nombre}`;
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('welcomeModal').style.display = 'none';
                switchSection('registro');
                await loadGlobalColonias();
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudo completar el registro', 'error');
            }
        }

        async function verificarAdminStatus() {
            if (!currentUser) return;
            try {
                const snapshot = await database.ref(`usuarios/${currentUser.uid}/administrador`).once('value');
                isAdmin = snapshot.val() === true;
                if (isAdmin) {
                    document.getElementById('adminBadge').classList.remove('hidden');
                    document.querySelector('.admin-only').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error verificando admin:', error);
            }
        }

        async function guardarVisita(e) {
            e.preventDefault();
            const nombre = document.getElementById('personaNombre').value.trim();
            if (!nombre) return Swal.fire('Error', 'El nombre es obligatorio', 'error');
            
            const data = {
                nombre: nombre,
                telefono: document.getElementById('personaTelefono').value,
                colonia: document.getElementById('personaColonia').value,
                fecha: new Date().toISOString(),
                brigadistaId: currentUser.uid,
                brigadistaNombre: currentUser.nombre
            };
            
            const fotoFile = document.getElementById('personaFoto').files[0];
            if (fotoFile) {
                if (online) {
                    try {
                        const url = await subirImagenCloudinary(fotoFile);
                        data.imagenUrl = url;
                    } catch (error) {
                        data.imagenBase64 = await fileToBase64(fotoFile);
                    }
                } else {
                    data.imagenBase64 = await fileToBase64(fotoFile);
                }
            }
            
            if (editandoId) {
    data.editado = true;
    if (online) {
        await actualizarEnFirebase(editandoId, data);
        vibrarFuerte();
        Swal.fire('Actualizado', 'Registro actualizado', 'success');
    } else {
        addToPendingQueue({ type: 'update', id: editandoId, data });
        vibrarFuerte();
        Swal.fire('Actualización pendiente', 'Se actualizará cuando haya conexión', 'info');
    }
    cancelarEdicion();  // Esta línea es importante
} else {
    if (online) {
        await guardarEnFirebase(data);
        vibrarFuerte();
        Swal.fire('Guardado', 'Registro guardado', 'success');
    } else {
        addToPendingQueue({ type: 'create', data });
        vibrarFuerte();
    }
}
            
            resetFormulario();
            if (!document.getElementById('visitasSection').classList.contains('hidden')) {
                await loadMisVisitas();
            }
            if (data.colonia) await agregarColoniaGlobal(data.colonia);
        }

        async function guardarEnFirebase(data) {
            const newRef = database.ref(`visitas/${currentUser.uid}`).push();
            await newRef.set(data);
            return newRef.key;
        }

        async function actualizarEnFirebase(id, data) {
            await database.ref(`visitas/${currentUser.uid}/${id}`).update(data);
        }

        async function eliminarEnFirebase(id) {
            await database.ref(`visitas/${currentUser.uid}/${id}`).remove();
        }

        async function eliminarVisita(id) {
            const result = await Swal.fire({
                title: '¿Eliminar?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sí, eliminar'
            });
            
            if (result.isConfirmed) {
                if (online) {
                    await eliminarEnFirebase(id);
                    vibrarFuerte();
                    Swal.fire('Eliminado', '', 'success');
                } else {
                    addToPendingQueue({ type: 'delete', id });
                    vibrarFuerte();
                    Swal.fire('Eliminación pendiente', 'Se eliminará cuando haya conexión', 'info');
                }
                await loadMisVisitas();
            }
        }

        function editarVisita(visita) {
    document.getElementById('personaNombre').value = visita.nombre;
    document.getElementById('personaTelefono').value = visita.telefono || '';
    document.getElementById('personaColonia').value = visita.colonia || '';
    
    // Ocultar botón Guardar, mostrar botones Actualizar y Cancelar
    document.getElementById('submitBtn').classList.add('hidden');
    document.getElementById('updateBtn').classList.remove('hidden');
    document.getElementById('cancelEditBtn').classList.remove('hidden');
    
    editandoId = visita.id;
    
    if (visita.imagenUrl) {
        document.getElementById('imagePreview').src = visita.imagenUrl;
        document.getElementById('imagePreview').style.display = 'block';
    } else {
        document.getElementById('imagePreview').style.display = 'none';
    }
    
    switchSection('registro');
}

        function cancelarEdicion() {
    resetFormulario();
    editandoId = null;
    
    // Mostrar botón Guardar, ocultar Actualizar y Cancelar
    document.getElementById('submitBtn').classList.remove('hidden');
    document.getElementById('updateBtn').classList.add('hidden');
    document.getElementById('cancelEditBtn').classList.add('hidden');
}

        function resetFormulario() {
            document.getElementById('visitaForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imagePreview').src = '';
             editandoId = null;
        }

        async function loadMisVisitas() {
            if (!currentUser) return;
            
            try {
                const snapshot = await database.ref(`visitas/${currentUser.uid}`).once('value');
                allVisitas = [];
                snapshot.forEach(child => {
                    allVisitas.push({ id: child.key, ...child.val() });
                });
                allVisitas.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                renderEstadisticas();
                renderVisitasList();
                await loadColoniasFiltro();
            } catch (error) {
                console.error('Error cargando visitas:', error);
            }
        }

        function renderEstadisticas() {
            const total = allVisitas.length;
            const conTelefono = allVisitas.filter(v => v.telefono && v.telefono.trim()).length;
            const sinTelefono = total - conTelefono;
            const coloniasDistintas = new Set(allVisitas.map(v => v.colonia).filter(c => c)).size;
            
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><i class="fas fa-users"></i><h3>${total}</h3><p>Total visitas</p></div>
                <div class="stat-card"><i class="fas fa-phone"></i><h3>${conTelefono}</h3><p>Con teléfono</p></div>
                <div class="stat-card"><i class="fas fa-phone-slash"></i><h3>${sinTelefono}</h3><p>Sin teléfono</p></div>
                <div class="stat-card"><i class="fas fa-city"></i><h3>${coloniasDistintas}</h3><p>Colonias visitadas</p></div>
            `;
        }

        function renderVisitasList() {
            const colonia = document.getElementById('filterColonia').value;
            const telefono = document.getElementById('filterTelefono').value;
            const fecha = document.getElementById('filterFecha').value;
            const search = document.getElementById('filterSearch').value.toLowerCase();
            
            let filtered = allVisitas.filter(v => {
                if (colonia && v.colonia !== colonia) return false;
                if (telefono === 'con' && (!v.telefono || !v.telefono.trim())) return false;
                if (telefono === 'sin' && v.telefono && v.telefono.trim()) return false;
                if (fecha && !v.fecha.startsWith(fecha)) return false;
                if (search && !v.nombre.toLowerCase().includes(search) && !(v.colonia || '').toLowerCase().includes(search)) return false;
                return true;
            });
            
            const container = document.getElementById('visitasList');
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:40px">📋 No hay registros</p>';
                return;
            }
            
            container.innerHTML = filtered.map(v => `
                <div class="visita-card">
                    <div class="visita-header">
                        <div class="visita-nombre">${escapeHtml(v.nombre)}</div>
                        <div class="visita-fecha">${new Date(v.fecha).toLocaleDateString()}</div>
                    </div>
                    ${v.telefono ? `<div><i class="fas fa-phone"></i> ${escapeHtml(v.telefono)}</div>` : ''}
                    ${v.colonia ? `<div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(v.colonia)}</div>` : ''}
                    <div class="visita-actions">
                        <button class="btn btn-primary btn-icon" onclick="editarVisita(${JSON.stringify(v).replace(/"/g, '&quot;')})"><i class="fas fa-edit"></i> Editar</button>
                        <button class="btn btn-danger btn-icon" onclick="eliminarVisita('${v.id}')"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadGlobalColonias() {
            try {
                const snapshot = await database.ref('colonias_globales').once('value');
                allColonias = [];
                if (snapshot.exists()) {
                    allColonias = Object.keys(snapshot.val());
                }
                const datalist = document.getElementById('coloniasList');
                datalist.innerHTML = allColonias.map(c => `<option value="${escapeHtml(c)}">`).join('');
            } catch (error) {
                console.error('Error cargando colonias:', error);
            }
        }

        async function loadColoniasFiltro() {
            const coloniasSet = new Set(allVisitas.map(v => v.colonia).filter(c => c));
            const select = document.getElementById('filterColonia');
            select.innerHTML = '<option value="">Todas las colonias</option>' + 
                Array.from(coloniasSet).map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
        }

        async function agregarColoniaGlobal(colonia) {
            if (!colonia || allColonias.includes(colonia)) return;
            try {
                await database.ref(`colonias_globales/${colonia}`).set(true);
                allColonias.push(colonia);
                const datalist = document.getElementById('coloniasList');
                datalist.innerHTML = allColonias.map(c => `<option value="${escapeHtml(c)}">`).join('');
            } catch (error) {
                console.error('Error agregando colonia:', error);
            }
        }

        async function subirImagenCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'sinfirmaupload');
            const response = await fetch('https://api.cloudinary.com/v1_1/davovja1g/image/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            return data.secure_url;
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function previewImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('imagePreview').src = ev.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function resetFilters() {
            document.getElementById('filterColonia').value = '';
            document.getElementById('filterTelefono').value = 'todos';
            document.getElementById('filterFecha').value = '';
            document.getElementById('filterSearch').value = '';
            renderVisitasList();
        }

        async function loadBrigadistas() {
            const search = document.getElementById('searchBrigadista')?.value.toLowerCase() || '';
            try {
                const snapshot = await database.ref('usuarios').once('value');
                const brigadistas = [];
                snapshot.forEach(child => {
                    const data = child.val();
                    brigadistas.push({ uid: child.key, ...data });
                });
                const filtered = brigadistas.filter(b => b.nombre.toLowerCase().includes(search));
                document.getElementById('brigadistasList').innerHTML = filtered.map(b => `
                    <div class="brigadista-card" onclick="verBrigadistaDetalle('${b.uid}', '${escapeHtml(b.nombre)}')">
                        <h3><i class="fas fa-user"></i> ${escapeHtml(b.nombre)}</h3>
                        <p><i class="fas fa-id-card"></i> ID: ${b.uid.substring(0,8)}...</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error cargando brigadistas:', error);
            }
        }

        async function verBrigadistaDetalle(uid, nombre) {
            try {
                const snapshot = await database.ref(`visitas/${uid}`).once('value');
                const visitas = [];
                snapshot.forEach(child => visitas.push({ id: child.key, ...child.val() }));
                const total = visitas.length;
                const conTelefono = visitas.filter(v => v.telefono && v.telefono.trim()).length;
                
                Swal.fire({
                    title: nombre,
                    html: `
                        <div style="text-align:left">
                            <p><strong>📊 Estadísticas:</strong></p>
                            <p>📋 Total visitas: ${total}</p>
                            <p>📞 Con teléfono: ${conTelefono}</p>
                            <p>🔇 Sin teléfono: ${total - conTelefono}</p>
                            <hr>
                            <p><strong>📝 Últimas visitas:</strong></p>
                            ${visitas.slice(0,5).map(v => `<p>• ${escapeHtml(v.nombre)} - ${new Date(v.fecha).toLocaleDateString()}</p>`).join('')}
                        </div>
                    `,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Exportar Excel',
                    cancelButtonText: 'Cerrar'
                }).then(result => {
                    if (result.isConfirmed) {
                        exportBrigadistaExcel(visitas, nombre);
                    }
                });
            } catch (error) {
                console.error('Error cargando detalle:', error);
            }
        }

        function exportBrigadistaExcel(visitas, nombre) {
            const data = visitas.map(v => ({
                Nombre: v.nombre,
                Teléfono: v.telefono || '',
                Colonia: v.colonia || '',
                Fecha: new Date(v.fecha).toLocaleString()
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Visitas');
            XLSX.writeFile(wb, `visitas_${nombre}.xlsx`);
            Swal.fire('Exportado', `Excel de ${nombre} generado`, 'success');
        }

        function exportMyVisitsToExcel() {
            const data = allVisitas.map(v => ({
                Nombre: v.nombre,
                Teléfono: v.telefono || '',
                Colonia: v.colonia || '',
                Fecha: new Date(v.fecha).toLocaleString()
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Mis Visitas');
            XLSX.writeFile(wb, `mis_visitas_${currentUser.nombre}.xlsx`);
            Swal.fire('Exportado', 'Tu Excel ha sido generado', 'success');
        }

        function exportAllToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text('Reporte General de Visitas', 20, 20);
            doc.setFontSize(10);
            let y = 35;
            allVisitas.forEach((v, i) => {
                if (y > 280) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. ${v.nombre}`, 20, y);
                doc.text(`   ${v.colonia || 'Sin colonia'} - ${new Date(v.fecha).toLocaleDateString()}`, 20, y + 5);
                y += 12;
            });
            doc.save('reporte_visitas.pdf');
            Swal.fire('PDF Generado', 'Reporte descargado', 'success');
        }

        function exportAllToExcel() {
            const allVisitasData = [];
            const promises = [];
            
            Swal.fire({
                title: 'Generando Excel...',
                text: 'Recopilando datos de todos los brigadistas',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            database.ref('usuarios').once('value').then(usuariosSnapshot => {
                const usuarios = [];
                usuariosSnapshot.forEach(child => {
                    usuarios.push({ uid: child.key, nombre: child.val().nombre });
                });
                
                usuarios.forEach(usuario => {
                    promises.push(
                        database.ref(`visitas/${usuario.uid}`).once('value').then(visitasSnapshot => {
                            visitasSnapshot.forEach(visita => {
                                allVisitasData.push({
                                    Brigadista: usuario.nombre,
                                    Nombre: visita.val().nombre,
                                    Teléfono: visita.val().telefono || '',
                                    Colonia: visita.val().colonia || '',
                                    Fecha: new Date(visita.val().fecha).toLocaleString()
                                });
                            });
                        })
                    );
                });
                
                Promise.all(promises).then(() => {
                    const ws = XLSX.utils.json_to_sheet(allVisitasData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, 'Todas las Visitas');
                    XLSX.writeFile(wb, 'todas_visitas.xlsx');
                    Swal.fire('Completado', 'Excel generado con todos los registros', 'success');
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function debounce(fn, delay) {
            let timeout;
            return function() {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, arguments), delay);
            };
        }

        // Hacer funciones globales
        window.editarVisita = editarVisita;
        window.eliminarVisita = eliminarVisita;
        window.verBrigadistaDetalle = verBrigadistaDetalle;

        init();


        // Función de vibración FUERTE
function vibrarFuerte() {
    if ('vibrate' in navigator) {
        // Patrón de vibración fuerte: 200ms vibra, 100ms pausa, 200ms vibra, 100ms pausa, 200ms vibra
        navigator.vibrate([200, 100, 200, 100, 200]);
        
        // También intentar vibración más fuerte si soporta (solo algunos navegadores)
        if (navigator.vibrate([500])) {
            setTimeout(() => navigator.vibrate([300]), 50);
        }
    } else {
        console.log("Este dispositivo no soporta vibración");
    }
}

// También puedes añadir vibración al hacer clic en botones
document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
        if (btn.id !== 'submitBtn' && btn.id !== 'updateBtn' && btn.id !== 'cancelEditBtn') {
            if ('vibrate' in navigator) navigator.vibrate(50);
        }
    });
});
    </script>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Service Worker registrado:', reg);
            }).catch(err => {
                console.error('Error registrando SW:', err);
            });
        }
    </script>
