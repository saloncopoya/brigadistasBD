    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAiojpfnGUPhaoQkpAh1Yey3fp6uWU-iFQ",
            authDomain: "aplicacion-2c1c8.firebaseapp.com",
            databaseURL: "https://aplicacion-2c1c8.firebaseio.com",
            projectId: "aplicacion-2c1c8",
            storageBucket: "aplicacion-2c1c8.firebasestorage.app",
            messagingSenderId: "837629411067",
            appId: "1:837629411067:web:6c96cfcd7490b049787a5e"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variables Globales
        let currentUser = null;
        let isAdmin = false;
        let pendingQueue = [];
        let online = navigator.onLine;
        let editandoId = null;
        let allVisitas = [];
        let allColonias = [];
        let deferredPrompt = null;

        // Inicialización
        async function init() {
            loadPendingQueue();
            updateOnlineStatus();
            setupEventListeners();
            checkSavedSession();
            setupPWAInstall();
            
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', () => updateOnlineStatus(false));
            
            await loadGlobalColonias();
        }

        function setupPWAInstall() {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const installBanner = document.getElementById('installBanner');
                const installBtn = document.getElementById('installBtn');
                installBanner.classList.remove('hidden');
                installBtn.classList.remove('hidden');
            });

            window.addEventListener('appinstalled', () => {
                deferredPrompt = null;
                document.getElementById('installBanner').classList.add('hidden');
                document.getElementById('installBtn').classList.add('hidden');
                Swal.fire('¡Instalado!', 'La aplicación se ha instalado correctamente', 'success');
            });

            document.getElementById('installNowBtn')?.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            document.getElementById('installBanner').classList.add('hidden');
                        }
                        deferredPrompt = null;
                    });
                }
            });

            document.getElementById('installBtn')?.addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                }
            });

            if (window.matchMedia('(display-mode: standalone)').matches) {
                document.getElementById('installBanner').classList.add('hidden');
                document.getElementById('installBtn').classList.add('hidden');
            }
        }

        function loadPendingQueue() {
            const saved = localStorage.getItem('pendingQueue');
            if (saved) {
                pendingQueue = JSON.parse(saved);
                updatePendingBadge();
            }
        }

        function savePendingQueue() {
            localStorage.setItem('pendingQueue', JSON.stringify(pendingQueue));
            updatePendingBadge();
        }

        function addToPendingQueue(operation) {
            pendingQueue.push({ ...operation, id: Date.now() });
            savePendingQueue();
            Swal.fire({
                icon: 'info',
                title: 'Sin conexión',
                text: 'Operación guardada, se sincronizará automáticamente.',
                toast: true,
                showConfirmButton: false,
                timer: 2000
            });
        }

        async function processPendingQueue() {
            if (!online || pendingQueue.length === 0) return;
            
            Swal.fire({
                title: 'Sincronizando...',
                text: `${pendingQueue.length} operaciones pendientes`,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            const queueCopy = [...pendingQueue];
            pendingQueue = [];
            savePendingQueue();
            
            for (const op of queueCopy) {
                try {
                    await executeOperation(op);
                } catch (error) {
                    console.error('Error en operación:', error);
                    pendingQueue.push(op);
                }
            }
            savePendingQueue();
            Swal.close();
            
            if (pendingQueue.length === 0) {
                Swal.fire('¡Sincronizado!', 'Todas las operaciones se completaron', 'success');
            }
            await loadMisVisitas();
        }

        async function executeOperation(op) {
            switch (op.type) {
                case 'create':
                    await guardarEnFirebase(op.data);
                    break;
                case 'update':
                    await actualizarEnFirebase(op.id, op.data);
                    break;
                case 'delete':
                    await eliminarEnFirebase(op.id);
                    break;
            }
        }

} else {

            const newRef = database.ref(`visitas/${currentUser.uid}`).push();
            await newRef.set(data);
            return newRef.key;
        }

        function renderVisitasList() {
            const colonia = document.getElementById('filterColonia').value;
            const telefono = document.getElementById('filterTelefono').value;
            const fecha = document.getElementById('filterFecha').value;
            const search = document.getElementById('filterSearch').value.toLowerCase();
            
            let filtered = allVisitas.filter(v => {
                if (colonia && v.colonia !== colonia) return false;
                if (telefono === 'con' && (!v.telefono || !v.telefono.trim())) return false;
                if (telefono === 'sin' && v.telefono && v.telefono.trim()) return false;
                if (fecha && !v.fecha.startsWith(fecha)) return false;
                if (search && !v.nombre.toLowerCase().includes(search) && !(v.colonia || '').toLowerCase().includes(search)) return false;
                return true;

        async function agregarColoniaGlobal(colonia) {

    if (allColonias.includes(coloniaMayus)) return;
    try {

    } catch (error) {
        console.error('Error agregando colonia:', error);
    }
}

        async function subirImagenCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'sinfirmaupload');
            const response = await fetch('https://api.cloudinary.com/v1_1/davovja1g/image/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            return data.secure_url;
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function previewImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('imagePreview').src = ev.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

            brigadistas.push({ uid: child.key, ...data });

        for (const b of brigadistas) {

                totalVisitas: total,

            if (v.colonia) {
                coloniasMap.set(v.colonia, (coloniasMap.get(v.colonia) || 0) + 1);
            }
        });
        
        // Ordenar colonias por cantidad de visitas (de mayor a menor)
        const coloniasOrdenadas = Array.from(coloniasMap.entries())
            .sort((a, b) => b[1] - a[1]);
        
        // Generar HTML de colonias con conteo
        const coloniasHtml = coloniasOrdenadas.length > 0

            `).join('')
            : '<div style="color:#999; text-align:center; padding:15px;">No hay colonias registradas</div>';
        
        // ✅ CORREGIDO: Mostrar TODAS las visitas, no solo 10
        // Ordenar visitas por fecha (más recientes primero)
        const visitasOrdenadas = [...visitas].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

        `).join('');

        function exportBrigadistaExcel(visitas, nombre) {
    const data = visitas.map(v => ({
        Nombre: v.nombre,
        Teléfono: v.telefono || '',
        Colonia: v.colonia || '',
        Fecha: new Date(v.fecha).toLocaleString()
    }));
    
    const ws = XLSX.utils.json_to_sheet(data);
    
    // 🔥 AGREGAR BORDES A TODAS LAS CELDAS
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:D1');
    for (let R = range.s.r; R <= range.e.r; ++R) {
        for (let C = range.s.c; C <= range.e.c; ++C) {
            const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
            if (!ws[cellAddress]) continue;
            ws[cellAddress].s = {
                border: {
                    top: { style: 'thin', color: { rgb: '000000' } },
                    bottom: { style: 'thin', color: { rgb: '000000' } },
                    left: { style: 'thin', color: { rgb: '000000' } },
                    right: { style: 'thin', color: { rgb: '000000' } }
                },
                alignment: { vertical: 'center', horizontal: 'left' },
                font: { sz: 11, name: 'Arial' }
            };
        }
    }
    
    // 🔥 ESTILO CABECERA
    for (let C = range.s.c; C <= range.e.c; ++C) {
        const cellAddress = XLSX.utils.encode_cell({ r: range.s.r, c: C });
        if (ws[cellAddress]) {
            ws[cellAddress].s = {
                font: { bold: true, sz: 12, name: 'Arial', color: { rgb: 'FFFFFF' } },
                fill: { fgColor: { rgb: '4472C4' } },
                border: {
                    top: { style: 'thin', color: { rgb: '000000' } },
                    bottom: { style: 'thin', color: { rgb: '000000' } },
                    left: { style: 'thin', color: { rgb: '000000' } },
                    right: { style: 'thin', color: { rgb: '000000' } }
                },
                alignment: { vertical: 'center', horizontal: 'center' }
            };
        }
    }
    
    // 🔥 AUTO AJUSTAR ANCHO DE COLUMNAS
    const colWidths = [];
    for (let C = range.s.c; C <= range.e.c; ++C) {
        let maxWidth = 0;
        for (let R = range.s.r; R <= range.e.r; ++R) {
            const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
            const cellValue = ws[cellAddress] ? ws[cellAddress].v : '';
            const cellLength = String(cellValue).length;
            if (cellLength > maxWidth) maxWidth = Math.min(cellLength, 50);
        }
        colWidths.push({ wch: maxWidth + 3 });
    }
    ws['!cols'] = colWidths;
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Visitas');
    XLSX.writeFile(wb, `visitas_${nombre}_${new Date().toISOString().slice(0,10)}.xlsx`);
    Swal.fire('Exportado', `Excel de ${nombre} generado con formato profesional`, 'success');
}

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function debounce(fn, delay) {
            let timeout;
            return function() {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, arguments), delay);
            };
        }

        // Hacer funciones globales
        window.editarVisita = editarVisita;
        window.eliminarVisita = eliminarVisita;
        window.verBrigadistaDetalle = verBrigadistaDetalle;

function vibrarFuerte() {
    if ('vibrate' in navigator) {
        // Patrón de vibración fuerte: 200ms vibra, 100ms pausa, 200ms vibra, 100ms pausa, 200ms vibra
        navigator.vibrate([200, 100, 200, 100, 200]);
        
        // También intentar vibración más fuerte si soporta (solo algunos navegadores)
        if (navigator.vibrate([500])) {
            setTimeout(() => navigator.vibrate([300]), 50);
        }
    } else {
        console.log("Este dispositivo no soporta vibración");
    }
}
