<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="Sistema de Gestión de Brigadistas - Offline First">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192?text=App">
    <title>Sistema Brigadistas | Gestión Offline</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* Container Principal */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .user-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: bold;
        }

        .admin-badge {
            background: #ef4444;
        }

        /* Banner Offline */
        .offline-banner {
            background: #f59e0b;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .offline-banner.online {
            background: #10b981;
        }

        /* Formulario */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group datalist, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        /* Estadísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .stat-card i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        /* Filtros */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filters select, .filters input {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
        }

        /* Lista de visitas */
        .visitas-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .visita-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .visita-card:hover {
            transform: translateY(-2px);
        }

        .visita-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .visita-nombre {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .visita-fecha {
            color: #666;
            font-size: 12px;
        }

        .visita-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-icon {
            padding: 8px 12px;
            font-size: 14px;
        }

        /* Menú flotante */
        .floating-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .menu-item {
            text-align: center;
            padding: 8px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            flex: 1;
        }

        .menu-item i {
            font-size: 24px;
            color: #667eea;
        }

        .menu-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .menu-item.active i, .menu-item.active span {
            color: white;
        }

        .menu-item span {
            display: block;
            font-size: 12px;
            margin-top: 4px;
            color: #666;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        /* Admin Panel */
        .brigadistas-list {
            display: grid;
            gap: 15px;
        }

        .brigadista-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .brigadista-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 15px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .hidden {
            display: none;
        }

        .pending-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 8px;
            border-radius: 50px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <i class="fas fa-hand-holding-heart" style="font-size: 30px; color: #667eea;"></i>
                <span id="userNameDisplay" class="user-badge">Cargando...</span>
                <span id="adminBadge" class="user-badge admin-badge hidden">Admin</span>
            </div>
            <div id="offlineBanner" class="offline-banner online">
                <i class="fas fa-wifi"></i>
                <span>Online</span>
                <span id="pendingCount" class="pending-badge hidden">0 pendientes</span>
            </div>
        </div>

        <!-- Sección Registro -->
        <div id="registroSection" class="form-card">
            <h2><i class="fas fa-user-plus"></i> Registrar Visita</h2>
            <form id="visitaForm">
                <div class="form-group">
                    <label>Nombre completo *</label>
                    <input type="text" id="personaNombre" required placeholder="Nombre de la persona">
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="personaTelefono" placeholder="Opcional">
                </div>
                <div class="form-group">
                    <label>Colonia</label>
                    <input type="text" id="personaColonia" list="coloniasList" placeholder="Colonia">
                    <datalist id="coloniasList"></datalist>
                </div>
                <div class="form-group">
                    <label>Fotografía</label>
                    <input type="file" id="personaFoto" accept="image/*">
                    <img id="imagePreview" class="image-preview" style="display: none;">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Guardar Visita</button>
                <button type="button" class="btn btn-danger hidden" id="cancelEditBtn">Cancelar Edición</button>
            </form>
        </div>

        <!-- Sección Mis Visitas -->
        <div id="visitasSection" class="hidden">
            <div class="stats-grid" id="statsContainer"></div>
            <div class="filters">
                <select id="filterColonia">
                    <option value="">Todas las colonias</option>
                </select>
                <select id="filterTelefono">
                    <option value="todos">Todos</option>
                    <option value="con">Con teléfono</option>
                    <option value="sin">Sin teléfono</option>
                </select>
                <input type="date" id="filterFecha">
                <input type="text" id="filterSearch" placeholder="Buscar...">
                <button class="btn btn-primary" id="resetFilters">Reset</button>
            </div>
            <div id="visitasList" class="visitas-list"></div>
        </div>

        <!-- Sección Admin -->
        <div id="adminSection" class="hidden">
            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary" id="exportAllPdfBtn"><i class="fas fa-file-pdf"></i> Todo PDF</button>
                <button class="btn btn-primary" id="exportAllExcelBtn"><i class="fas fa-file-excel"></i> Todo Excel</button>
            </div>
            <div class="form-group">
                <input type="text" id="searchBrigadista" placeholder="Buscar brigadista...">
            </div>
            <div id="brigadistasList" class="brigadistas-list"></div>
        </div>
    </div>

    <!-- Menú Flotante -->
    <div class="floating-menu">
        <div class="menu-item" data-section="registro">
            <i class="fas fa-plus-circle"></i>
            <span>Registro</span>
        </div>
        <div class="menu-item" data-section="visitas">
            <i class="fas fa-list"></i>
            <span>Mis Visitas</span>
        </div>
        <div class="menu-item admin-only hidden" data-section="admin">
            <i class="fas fa-users-cog"></i>
            <span>Admin</span>
        </div>
    </div>

    <!-- Modal Bienvenida -->
    <div id="welcomeModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-hand-holding-heart" style="font-size: 50px; color: #667eea;"></i>
            <h2>¡Bienvenido Brigadista!</h2>
            <p>Ingresa tu nombre completo para continuar</p>
            <div class="form-group">
                <input type="text" id="brigadistaNombre" placeholder="Nombre completo" required>
            </div>
            <button class="btn btn-primary" id="confirmarAcceso">Acceder</button>
        </div>
    </div>

    <script>
        // Configuración Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAiojpfnGUPhaoQkpAh1Yey3fp6uWU-iFQ",
            authDomain: "aplicacion-2c1c8.firebaseapp.com",
            databaseURL: "https://aplicacion-2c1c8.firebaseio.com",
            projectId: "aplicacion-2c1c8",
            storageBucket: "aplicacion-2c1c8.firebasestorage.app",
            messagingSenderId: "837629411067",
            appId: "1:837629411067:web:6c96cfcd7490b049787a5e"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variables Globales
        let currentUser = null;
        let isAdmin = false;
        let pendingQueue = [];
        let online = navigator.onLine;
        let editandoId = null;
        let allVisitas = [];
        let allColonias = [];

        // Inicialización
        async function init() {
            loadPendingQueue();
            updateOnlineStatus();
            setupEventListeners();
            checkSavedSession();
            
            window.addEventListener('online', handleOnline);
            window.addEventListener('offline', () => updateOnlineStatus(false));
            
            await loadGlobalColonias();
        }

        function loadPendingQueue() {
            const saved = localStorage.getItem('pendingQueue');
            if (saved) {
                pendingQueue = JSON.parse(saved);
                updatePendingBadge();
            }
        }

        function savePendingQueue() {
            localStorage.setItem('pendingQueue', JSON.stringify(pendingQueue));
            updatePendingBadge();
        }

        function addToPendingQueue(operation) {
            pendingQueue.push({ ...operation, id: Date.now() });
            savePendingQueue();
            Swal.fire({
                icon: 'info',
                title: 'Sin conexión',
                text: 'Operación guardada, se sincronizará automáticamente.',
                toast: true,
                showConfirmButton: false,
                timer: 2000
            });
        }

        async function processPendingQueue() {
            if (!online || pendingQueue.length === 0) return;
            
            Swal.fire({
                title: 'Sincronizando...',
                text: `${pendingQueue.length} operaciones pendientes`,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });
            
            const queueCopy = [...pendingQueue];
            pendingQueue = [];
            savePendingQueue();
            
            for (const op of queueCopy) {
                try {
                    await executeOperation(op);
                } catch (error) {
                    console.error('Error en operación:', error);
                    pendingQueue.push(op);
                }
            }
            savePendingQueue();
            Swal.close();
            
            if (pendingQueue.length === 0) {
                Swal.fire('¡Sincronizado!', 'Todas las operaciones se completaron', 'success');
            }
            await loadMisVisitas();
        }

        async function executeOperation(op) {
            switch (op.type) {
                case 'create':
                    await guardarEnFirebase(op.data);
                    break;
                case 'update':
                    await actualizarEnFirebase(op.id, op.data);
                    break;
                case 'delete':
                    await eliminarEnFirebase(op.id);
                    break;
            }
        }

        async function handleOnline() {
            updateOnlineStatus(true);
            await processPendingQueue();
            await loadMisVisitas();
            if (currentUser) await loadGlobalColonias();
        }

        function updateOnlineStatus(isOnline = navigator.onLine) {
            online = isOnline;
            const banner = document.getElementById('offlineBanner');
            if (online) {
                banner.className = 'offline-banner online';
                banner.innerHTML = '<i class="fas fa-wifi"></i><span>Online</span><span id="pendingCount" class="pending-badge hidden"></span>';
            } else {
                banner.className = 'offline-banner';
                banner.innerHTML = '<i class="fas fa-plug"></i><span>Offline - Modo sin conexión</span><span id="pendingCount" class="pending-badge"></span>';
            }
            updatePendingBadge();
        }

        function updatePendingBadge() {
            const pendingSpan = document.getElementById('pendingCount');
            if (pendingQueue.length > 0) {
                pendingSpan.textContent = `${pendingQueue.length} pendientes`;
                pendingSpan.classList.remove('hidden');
            } else {
                pendingSpan.classList.add('hidden');
            }
        }

        function setupEventListeners() {
            document.getElementById('visitaForm').addEventListener('submit', guardarVisita);
            document.getElementById('cancelEditBtn').addEventListener('click', cancelarEdicion);
            document.getElementById('resetFilters').addEventListener('click', resetFilters);
            document.getElementById('exportAllPdfBtn')?.addEventListener('click', () => exportAllToPDF());
            document.getElementById('exportAllExcelBtn')?.addEventListener('click', () => exportAllToExcel());
            document.getElementById('searchBrigadista')?.addEventListener('input', debounce(loadBrigadistas, 300));
            
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', () => switchSection(item.dataset.section));
            });
            
            document.getElementById('confirmarAcceso').addEventListener('click', registrarBrigadista);
            document.getElementById('personaFoto').addEventListener('change', previewImage);
            
            ['filterColonia', 'filterTelefono', 'filterFecha', 'filterSearch'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', () => renderVisitasList());
            });
        }

        function switchSection(section) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.menu-item[data-section="${section}"]`).classList.add('active');
            
            document.getElementById('registroSection').classList.add('hidden');
            document.getElementById('visitasSection').classList.add('hidden');
            document.getElementById('adminSection').classList.add('hidden');
            
            document.getElementById(`${section}Section`).classList.remove('hidden');
            
            if (section === 'visitas') loadMisVisitas();
            if (section === 'admin' && isAdmin) loadBrigadistas();
        }

        async function checkSavedSession() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                await verificarAdminStatus();
                document.getElementById('userNameDisplay').textContent = currentUser.nombre;
                document.getElementById('welcomeModal').style.display = 'none';
                switchSection('registro');
                await loadGlobalColonias();
            } else {
                document.getElementById('welcomeModal').style.display = 'flex';
            }
        }

        async function registrarBrigadista() {
            const nombre = document.getElementById('brigadistaNombre').value.trim();
            if (!nombre) {
                Swal.fire('Error', 'Ingresa tu nombre completo', 'error');
                return;
            }
            
            try {
                const usuariosRef = database.ref('usuarios');
                const snapshot = await usuariosRef.orderByChild('nombre').equalTo(nombre).once('value');
                let uid, esAdmin = false;
                
                if (snapshot.exists()) {
                    const [key, userData] = Object.entries(snapshot.val())[0];
                    uid = key;
                    esAdmin = userData.administrador || false;
                    Swal.fire('Bienvenido', `Hola de nuevo ${nombre}`, 'success');
                } else {
                    uid = Date.now().toString();
                    await usuariosRef.child(uid).set({
                        nombre: nombre,
                        creado: Date.now()
                    });
                    Swal.fire('Registro exitoso', `Bienvenido ${nombre}`, 'success');
                }
                
                currentUser = { uid, nombre, administrador: esAdmin };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                isAdmin = esAdmin;
                
                if (isAdmin) {
                    document.getElementById('adminBadge').classList.remove('hidden');
                    document.querySelector('.admin-only').classList.remove('hidden');
                }
                
                document.getElementById('userNameDisplay').textContent = nombre;
                document.getElementById('welcomeModal').style.display = 'none';
                switchSection('registro');
                await loadGlobalColonias();
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'No se pudo completar el registro', 'error');
            }
        }

        async function verificarAdminStatus() {
            if (!currentUser) return;
            try {
                const snapshot = await database.ref(`usuarios/${currentUser.uid}/administrador`).once('value');
                isAdmin = snapshot.val() === true;
                if (isAdmin) {
                    document.getElementById('adminBadge').classList.remove('hidden');
                    document.querySelector('.admin-only').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error verificando admin:', error);
            }
        }

        async function guardarVisita(e) {
            e.preventDefault();
            const nombre = document.getElementById('personaNombre').value.trim();
            if (!nombre) return Swal.fire('Error', 'El nombre es obligatorio', 'error');
            
            const data = {
                nombre: nombre,
                telefono: document.getElementById('personaTelefono').value,
                colonia: document.getElementById('personaColonia').value,
                fecha: new Date().toISOString(),
                brigadistaId: currentUser.uid,
                brigadistaNombre: currentUser.nombre
            };
            
            const fotoFile = document.getElementById('personaFoto').files[0];
            if (fotoFile) {
                if (online) {
                    const url = await subirImagenCloudinary(fotoFile);
                    data.imagenUrl = url;
                } else {
                    data.imagenBase64 = await fileToBase64(fotoFile);
                }
            }
            
            if (editandoId) {
                data.editado = true;
                if (online) {
                    await actualizarEnFirebase(editandoId, data);
                    Swal.fire('Actualizado', 'Registro actualizado', 'success');
                } else {
                    addToPendingQueue({ type: 'update', id: editandoId, data });
                }
                cancelarEdicion();
            } else {
                if (online) {
                    await guardarEnFirebase(data);
                    Swal.fire('Guardado', 'Registro guardado', 'success');
                } else {
                    addToPendingQueue({ type: 'create', data });
                }
            }
            
            resetFormulario();
            if (document.getElementById('visitasSection').classList.contains('hidden') === false) {
                await loadMisVisitas();
            }
            if (data.colonia) await agregarColoniaGlobal(data.colonia);
        }

        async function guardarEnFirebase(data) {
            const newRef = database.ref(`visitas/${currentUser.uid}`).push();
            await newRef.set(data);
            return newRef.key;
        }

        async function actualizarEnFirebase(id, data) {
            await database.ref(`visitas/${currentUser.uid}/${id}`).update(data);
        }

        async function eliminarEnFirebase(id) {
            await database.ref(`visitas/${currentUser.uid}/${id}`).remove();
        }

        async function eliminarVisita(id) {
            const result = await Swal.fire({
                title: '¿Eliminar?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true
            });
            
            if (result.isConfirmed) {
                if (online) {
                    await eliminarEnFirebase(id);
                    Swal.fire('Eliminado', '', 'success');
                } else {
                    addToPendingQueue({ type: 'delete', id });
                    Swal.fire('Eliminación pendiente', 'Se eliminará cuando haya conexión', 'info');
                }
                await loadMisVisitas();
            }
        }

        function editarVisita(visita) {
            document.getElementById('personaNombre').value = visita.nombre;
            document.getElementById('personaTelefono').value = visita.telefono || '';
            document.getElementById('personaColonia').value = visita.colonia || '';
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            editandoId = visita.id;
            if (visita.imagenUrl) {
                document.getElementById('imagePreview').src = visita.imagenUrl;
                document.getElementById('imagePreview').style.display = 'block';
            }
            switchSection('registro');
        }

        function cancelarEdicion() {
            resetFormulario();
            editandoId = null;
            document.getElementById('submitBtn').classList.remove('hidden');
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function resetFormulario() {
            document.getElementById('visitaForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imagePreview').src = '';
        }

        async function loadMisVisitas() {
            if (!currentUser) return;
            
            try {
                const snapshot = await database.ref(`visitas/${currentUser.uid}`).once('value');
                allVisitas = [];
                snapshot.forEach(child => {
                    allVisitas.push({ id: child.key, ...child.val() });
                });
                allVisitas.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                renderEstadisticas();
                renderVisitasList();
                await loadColoniasFiltro();
            } catch (error) {
                console.error('Error cargando visitas:', error);
            }
        }

        function renderEstadisticas() {
            const total = allVisitas.length;
            const conTelefono = allVisitas.filter(v => v.telefono && v.telefono.trim()).length;
            const sinTelefono = total - conTelefono;
            const coloniasDistintas = new Set(allVisitas.map(v => v.colonia).filter(c => c)).size;
            
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><i class="fas fa-users"></i><h3>${total}</h3><p>Total visitas</p></div>
                <div class="stat-card"><i class="fas fa-phone"></i><h3>${conTelefono}</h3><p>Con teléfono</p></div>
                <div class="stat-card"><i class="fas fa-phone-slash"></i><h3>${sinTelefono}</h3><p>Sin teléfono</p></div>
                <div class="stat-card"><i class="fas fa-city"></i><h3>${coloniasDistintas}</h3><p>Colonias visitadas</p></div>
            `;
        }

        function renderVisitasList() {
            const colonia = document.getElementById('filterColonia').value;
            const telefono = document.getElementById('filterTelefono').value;
            const fecha = document.getElementById('filterFecha').value;
            const search = document.getElementById('filterSearch').value.toLowerCase();
            
            let filtered = allVisitas.filter(v => {
                if (colonia && v.colonia !== colonia) return false;
                if (telefono === 'con' && (!v.telefono || !v.telefono.trim())) return false;
                if (telefono === 'sin' && v.telefono && v.telefono.trim()) return false;
                if (fecha && !v.fecha.startsWith(fecha)) return false;
                if (search && !v.nombre.toLowerCase().includes(search) && !(v.colonia || '').toLowerCase().includes(search)) return false;
                return true;
            });
            
            const container = document.getElementById('visitasList');
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center">No hay registros</p>';
                return;
            }
            
            container.innerHTML = filtered.map(v => `
                <div class="visita-card">
                    <div class="visita-header">
                        <div class="visita-nombre">${escapeHtml(v.nombre)}</div>
                        <div class="visita-fecha">${new Date(v.fecha).toLocaleDateString()}</div>
                    </div>
                    ${v.telefono ? `<div><i class="fas fa-phone"></i> ${escapeHtml(v.telefono)}</div>` : ''}
                    ${v.colonia ? `<div><i class="fas fa-map-marker-alt"></i> ${escapeHtml(v.colonia)}</div>` : ''}
                    <div class="visita-actions">
                        <button class="btn btn-primary btn-icon" onclick="editarVisita(${JSON.stringify(v).replace(/"/g, '&quot;')})"><i class="fas fa-edit"></i> Editar</button>
                        <button class="btn btn-danger btn-icon" onclick="eliminarVisita('${v.id}')"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadGlobalColonias() {
            try {
                const snapshot = await database.ref('colonias_globales').once('value');
                allColonias = [];
                if (snapshot.exists()) {
                    allColonias = Object.keys(snapshot.val());
                }
                const datalist = document.getElementById('coloniasList');
                datalist.innerHTML = allColonias.map(c => `<option value="${escapeHtml(c)}">`).join('');
            } catch (error) {
                console.error('Error cargando colonias:', error);
            }
        }

        async function loadColoniasFiltro() {
            const coloniasSet = new Set(allVisitas.map(v => v.colonia).filter(c => c));
            const select = document.getElementById('filterColonia');
            select.innerHTML = '<option value="">Todas las colonias</option>' + 
                Array.from(coloniasSet).map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
        }

        async function agregarColoniaGlobal(colonia) {
            if (!colonia || allColonias.includes(colonia)) return;
            try {
                await database.ref(`colonias_globales/${colonia}`).set(true);
                allColonias.push(colonia);
            } catch (error) {
                console.error('Error agregando colonia:', error);
            }
        }

        async function subirImagenCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'sinfirmaupload');
            const response = await fetch('https://api.cloudinary.com/v1_1/davovja1g/image/upload', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            return data.secure_url;
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function previewImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('imagePreview').src = ev.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function resetFilters() {
            document.getElementById('filterColonia').value = '';
            document.getElementById('filterTelefono').value = 'todos';
            document.getElementById('filterFecha').value = '';
            document.getElementById('filterSearch').value = '';
            renderVisitasList();
        }

        async function loadBrigadistas() {
            const search = document.getElementById('searchBrigadista')?.value.toLowerCase() || '';
            try {
                const snapshot = await database.ref('usuarios').once('value');
                const brigadistas = [];
                snapshot.forEach(child => {
                    const data = child.val();
                    brigadistas.push({ uid: child.key, ...data });
                });
                const filtered = brigadistas.filter(b => b.nombre.toLowerCase().includes(search));
                document.getElementById('brigadistasList').innerHTML = filtered.map(b => `
                    <div class="brigadista-card" onclick="verBrigadistaDetalle('${b.uid}', '${escapeHtml(b.nombre)}')">
                        <h3>${escapeHtml(b.nombre)}</h3>
                        <p><i class="fas fa-id-card"></i> ID: ${b.uid}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error cargando brigadistas:', error);
            }
        }

        async function verBrigadistaDetalle(uid, nombre) {
            try {
                const snapshot = await database.ref(`visitas/${uid}`).once('value');
                const visitas = [];
                snapshot.forEach(child => visitas.push(child.val()));
                const total = visitas.length;
                const conTelefono = visitas.filter(v => v.telefono && v.telefono.trim()).length;
                
                Swal.fire({
                    title: nombre,
                    html: `
                        <p><strong>Total visitas:</strong> ${total}</p>
                        <p><strong>Con teléfono:</strong> ${conTelefono}</p>
                        <p><strong>Sin teléfono:</strong> ${total - conTelefono}</p>
                    `,
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'Ver Detalle'
                }).then(result => {
                    if (result.isConfirmed) {
                        mostrarVisitasBrigadista(visitas, nombre);
                    }
                });
            } catch (error) {
                console.error('Error cargando detalle:', error);
            }
        }

        function mostrarVisitasBrigadista(visitas, nombre) {
            const html = visitas.map(v => `
                <div style="border-bottom:1px solid #ddd; padding:10px">
                    <strong>${escapeHtml(v.nombre)}</strong><br>
                    ${v.colonia ? `Colonia: ${escapeHtml(v.colonia)}<br>` : ''}
                    ${v.telefono ? `Tel: ${escapeHtml(v.telefono)}<br>` : ''}
                    Fecha: ${new Date(v.fecha).toLocaleString()}
                </div>
            `).join('');
            Swal.fire({
                title: `Visitas de ${nombre}`,
                html: `<div style="max-height:400px; overflow-y:auto">${html || 'No hay visitas'}</div>`,
                width: '600px'
            });
        }

        function exportAllToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text('Reporte General de Visitas', 20, 20);
            let y = 30;
            allVisitas.forEach((v, i) => {
                if (y > 280) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. ${v.nombre} - ${v.colonia || 'Sin colonia'} - ${new Date(v.fecha).toLocaleDateString()}`, 20, y);
                y += 10;
            });
            doc.save('reporte_visitas.pdf');
        }

        function exportAllToExcel() {
            const data = allVisitas.map(v => ({
                Nombre: v.nombre,
                Teléfono: v.telefono || '',
                Colonia: v.colonia || '',
                Fecha: new Date(v.fecha).toLocaleString()
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Visitas');
            XLSX.writeFile(wb, 'reporte_visitas.xlsx');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function debounce(fn, delay) {
            let timeout;
            return function() {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, arguments), delay);
            };
        }

        // Hacer funciones globales
        window.editarVisita = editarVisita;
        window.eliminarVisita = eliminarVisita;
        window.verBrigadistaDetalle = verBrigadistaDetalle;

        init();
    </script>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Service Worker registrado:', reg);
            }).catch(err => {
                console.error('Error registrando SW:', err);
            });
        }
    </script>
</body>
</html>
